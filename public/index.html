<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Nano Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
    <h1 class="text-3xl font-black mb-6 text-indigo-600 text-center tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
        GO SHORT!
    </h1>

    <div class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Link gốc</label>
            <input id="url" type="text" placeholder="https://facebook.com/my-profile"
                   class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Bí danh tùy chỉnh (Tùy chọn)</label>
            <input id="custom" type="text" placeholder="vidu: bio-cua-toi"
                   class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <button onclick="shorten()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
            Rút gọn ngay
        </button>
    </div>

    <div id="result-box" class="mt-8 p-4 bg-indigo-50 rounded-xl hidden border border-indigo-100">
        <p class="text-xs text-indigo-400 font-bold uppercase mb-2">Link của bạn:</p>
        <div class="flex items-center gap-2">
            <div id="result" class="flex-1 font-mono text-indigo-700 break-all select-all text-lg font-semibold overflow-hidden whitespace-nowrap text-ellipsis">
            </div>
            <button id="copy-btn" onclick="copyToClipboard()" class="bg-indigo-200 hover:bg-indigo-300 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                Copy
            </button>
        </div>
    </div>
</div>

<script>
    let currentShortUrl = "";

    async function shorten() {
        const urlInput = document.getElementById('url');
        const customInput = document.getElementById('custom');
        const resBox = document.getElementById('result-box');
        const resText = document.getElementById('result');
        const copyBtn = document.getElementById('copy-btn');

        if (!urlInput.value) return alert("Vui lòng nhập link!");

        const formData = new FormData();
        formData.append('url', urlInput.value);
        formData.append('custom', customInput.value);

        try {
            const response = await fetch('/api/main', { method: 'POST', body: formData });
            const data = await response.text();

            if (response.ok) {
                currentShortUrl = window.location.origin + '/' + data;
                resText.innerHTML = `<a href="${currentShortUrl}" target="_blank" class="hover:text-indigo-900 underline">${currentShortUrl}</a>`;
                resBox.classList.remove('hidden');
                copyBtn.innerText = "Copy"; // Reset lại chữ trên nút
            } else {
                alert("Lỗi: " + data);
            }
        } catch (e) {
            alert("Không thể kết nối đến server!");
        }
    }

    async function copyToClipboard() {
        const copyBtn = document.getElementById('copy-btn');
        try {
            await navigator.clipboard.writeText(currentShortUrl);

            // Hiệu ứng sau khi copy thành công
            copyBtn.innerText = "Đã chép!";
            copyBtn.classList.replace('bg-indigo-200', 'bg-emerald-200');
            copyBtn.classList.replace('text-indigo-700', 'text-emerald-700');

            setTimeout(() => {
                copyBtn.innerText = "Copy";
                copyBtn.classList.replace('bg-emerald-200', 'bg-indigo-200');
                copyBtn.classList.replace('text-emerald-700', 'text-indigo-700');
            }, 2000);
        } catch (err) {
            alert("Không thể copy, vui lòng copy thủ công!");
        }
    }
</script>
</body>
</html>
